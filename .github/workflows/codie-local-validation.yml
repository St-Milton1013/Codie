name: Codie Local Validation Gate

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      phase_id:
        description: Phase id to validate
        required: true
        type: string
      phase_part:
        description: Phase part to validate
        required: true
        type: string
      gate_scope:
        description: Validation gate scope
        required: true
        type: choice
        options:
          - INTERMEDIATE_PACKET
          - FINAL_PHASE
      pull_request_number:
        description: Pull request number
        required: true
        type: string
      pr_branch:
        description: Pull request head branch
        required: true
        type: string
      base_branch:
        description: Pull request base branch
        required: false
        default: main
        type: string
      target_sha:
        description: Exact target SHA
        required: true
        type: string
      run_repair:
        description: Allow repair controller after validation
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read

jobs:
  pull-request-validation:
    name: Pull Request Validation
    if: ${{ github.event_name == 'pull_request' && github.event.repository.full_name == 'St-Milton1013/Codie' && github.event.pull_request.head.repo.full_name == github.event.repository.full_name }}
    runs-on:
      - self-hosted
      - Windows
      - X64
      - codie-local
    env:
      CODIE_PYTHON: C:\Users\Main\.venvs\codie-py312\Scripts\python.exe
      OPENAI_API_KEY: ""
    steps:
      - name: Check out pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Resolve active validation scope
        id: scope
        shell: pwsh
        run: |
          $scopeLines = & "$env:CODIE_PYTHON" scripts/codie_validation_gate.py --print-active-scope
          foreach ($line in $scopeLines) {
            Add-Content -Path $env:GITHUB_OUTPUT -Value $line
          }

      - name: Run validation only
        shell: pwsh
        run: |
          & "$env:CODIE_PYTHON" scripts/codie_validation_gate.py `
            --phase-id "${{ steps.scope.outputs.phase_id }}" `
            --phase-part "${{ steps.scope.outputs.phase_part }}" `
            --gate-scope "${{ steps.scope.outputs.gate_scope }}" `
            --pull-request-number "${{ github.event.pull_request.number }}" `
            --branch "${{ github.event.pull_request.head.ref }}" `
            --base-branch "${{ github.event.pull_request.base.ref }}" `
            --target-sha "${{ github.event.pull_request.head.sha }}" `
            --output-dir validation_artifacts `
            --python-executable "$env:CODIE_PYTHON"

      - name: Write job summary
        if: always()
        shell: pwsh
        run: |
          if (Test-Path validation_artifacts/codie-validation-summary.md) {
            Get-Content validation_artifacts/codie-validation-summary.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          }

      - name: Upload validation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codie-pr-validation-${{ github.event.pull_request.head.sha }}
          path: validation_artifacts/
          if-no-files-found: error

  manual-validation:
    name: Manual Validation
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.repository.full_name == 'St-Milton1013/Codie' }}
    outputs:
      aggregate_result: ${{ steps.validation.outputs.aggregate_result }}
    runs-on:
      - self-hosted
      - Windows
      - X64
      - codie-local
    env:
      CODIE_PYTHON: C:\Users\Main\.venvs\codie-py312\Scripts\python.exe
      OPENAI_API_KEY: ""
    steps:
      - name: Check out exact target
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_sha }}
          persist-credentials: false

      - name: Run validation only
        id: validation
        shell: pwsh
        run: |
          $exitCode = 0
          & "$env:CODIE_PYTHON" scripts/codie_validation_gate.py `
            --phase-id "${{ inputs.phase_id }}" `
            --phase-part "${{ inputs.phase_part }}" `
            --gate-scope "${{ inputs.gate_scope }}" `
            --pull-request-number "${{ inputs.pull_request_number }}" `
            --branch "${{ inputs.pr_branch }}" `
            --base-branch "${{ inputs.base_branch }}" `
            --target-sha "${{ inputs.target_sha }}" `
            --output-dir validation_artifacts `
            --python-executable "$env:CODIE_PYTHON"
          $exitCode = $LASTEXITCODE
          $aggregateResult = "VALIDATOR_ERROR"
          if (Test-Path validation_artifacts/codie-validation-result.json) {
            $payload = Get-Content validation_artifacts/codie-validation-result.json -Raw | ConvertFrom-Json
            $aggregateResult = $payload.final_result
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "aggregate_result=$aggregateResult"
          exit $exitCode

      - name: Upload validation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codie-manual-validation-${{ inputs.target_sha }}
          path: validation_artifacts/
          if-no-files-found: error

  manual-repair:
    name: Manual Repair
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.run_repair == true && github.event.repository.full_name == 'St-Milton1013/Codie' && needs.manual-validation.outputs.aggregate_result == 'REPAIR_REQUIRED' }}
    needs: manual-validation
    permissions:
      contents: write
      actions: read
    runs-on:
      - self-hosted
      - Windows
      - X64
      - codie-local
    env:
      CODIE_PYTHON: C:\Users\Main\.venvs\codie-py312\Scripts\python.exe
      GH_TOKEN: ${{ github.token }}
      OPENAI_API_KEY: ""
    steps:
      - name: Check out exact target with write credentials
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_sha }}
          persist-credentials: true

      - name: Run repair controller
        shell: pwsh
        run: |
          & "$env:CODIE_PYTHON" scripts/codie_repair_controller.py `
            --phase-id "${{ inputs.phase_id }}" `
            --phase-part "${{ inputs.phase_part }}" `
            --gate-scope "${{ inputs.gate_scope }}" `
            --pull-request-number "${{ inputs.pull_request_number }}" `
            --pr-branch "${{ inputs.pr_branch }}" `
            --base-branch "${{ inputs.base_branch }}" `
            --target-sha "${{ inputs.target_sha }}" `
            --output-dir validation_artifacts `
            --expected-validation-result "${{ needs.manual-validation.outputs.aggregate_result }}" `
            --python-executable "$env:CODIE_PYTHON"

      - name: Write repair job summary
        if: always()
        shell: pwsh
        run: |
          if (Test-Path validation_artifacts/repair-summary.md) {
            Get-Content validation_artifacts/repair-summary.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          }

      - name: Upload repair artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codie-manual-repair-${{ inputs.target_sha }}
          path: validation_artifacts/
          if-no-files-found: error
